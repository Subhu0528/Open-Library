<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz History - Open Library</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .history-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .history-header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .history-title {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .history-subtitle {
            color: #666;
            font-size: 16px;
        }

        .filter-section {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .filter-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .quiz-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .quiz-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .quiz-card.completed {
            border-left: 5px solid #28a745;
        }

        .quiz-card.incomplete {
            border-left: 5px solid #ffc107;
        }

        .quiz-header-card {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .quiz-subject {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .quiz-status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        .status-incomplete {
            background: #fff3cd;
            color: #856404;
        }

        .quiz-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 15px 0;
        }

        .info-item {
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .info-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .info-value {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .quiz-date {
            font-size: 13px;
            color: #999;
            margin-top: 15px;
        }

        .quiz-action {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .quiz-action:hover {
            background: #5568d3;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 15px;
        }

        .empty-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .empty-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .empty-text {
            color: #666;
            margin-bottom: 25px;
            font-size: 16px;
        }

        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .back-button {
            display: inline-block;
            margin-bottom: 20px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            opacity: 0.8;
            color: white;
        }

        .stats-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-card {
            text-align: center;
            padding: 20px;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .quiz-grid {
                grid-template-columns: 1fr;
            }

            .history-title {
                font-size: 24px;
            }

            .filter-section {
                flex-direction: column;
            }

            .filter-btn {
                width: 100%;
            }

            .stats-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="history-container">
        <!-- Back Button -->
        <a href="/" class="back-button">← Back to Home</a>

        <!-- Header -->
        <div class="history-header">
            <div class="history-title">📊 Your Quiz History</div>
            <div class="history-subtitle">Review your past quizzes and track your progress</div>
            
            <div class="filter-section">
                <button class="filter-btn active" onclick="filterQuizzes('all')">All Quizzes</button>
                <button class="filter-btn" onclick="filterQuizzes('completed')">✓ Completed</button>
                <button class="filter-btn" onclick="filterQuizzes('incomplete')">⏳ Incomplete</button>
            </div>
        </div>

        <!-- Statistics -->
        <div th:if="${!quizzes.isEmpty()}" class="stats-section">
            <div class="stat-card">
                <div class="stat-number" th:text="${quizzes.size()}"></div>
                <div class="stat-label">Total Quizzes</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${#lists.size(quizzes.?{completed == true})}"></div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${#lists.size(quizzes.?{completed == false})}"></div>
                <div class="stat-label">In Progress</div>
            </div>
        </div>

        <!-- Quiz Cards -->
        <div th:if="${!quizzes.isEmpty()}">
            <div class="quiz-grid">
                <div th:each="quiz : ${quizzes}" 
                     th:class="'quiz-card ' + (${quiz.completed} ? 'completed' : 'incomplete')"
                     th:data-completed="${quiz.completed}">
                    
                    <div class="quiz-header-card">
                        <div class="quiz-subject" th:text="${quiz.subject}"></div>
                        <div class="quiz-status" th:class="'quiz-status ' + (${quiz.completed} ? 'status-completed' : 'status-incomplete')"
                             th:text="${quiz.completed} ? '✓ Completed' : '⏳ In Progress'"></div>
                    </div>

                    <div class="quiz-info">
                        <div class="info-item">
                            <div class="info-label">Questions</div>
                            <div class="info-value" th:text="${quiz.numberOfQuestions}"></div>
                        </div>
                        <div class="info-item" th:if="${quiz.completed}">
                            <div class="info-label">Score</div>
                            <div class="info-value" th:text="${quiz.score} + '/' + ${quiz.numberOfQuestions}"></div>
                        </div>
                        <div class="info-item" th:if="!${quiz.completed}">
                            <div class="info-label">Status</div>
                            <div class="info-value" style="color: #ffc107;">Pending</div>
                        </div>
                    </div>

                    <div class="quiz-date">
                        <span>Created: </span>
                        <span th:text="${#dates.format(quiz.createdAt, 'MMM dd, yyyy')}"></span>
                    </div>

                    <a th:href="@{'/quiz/result/' + ${quiz.id}}" class="quiz-action" th:text="${quiz.completed} ? '📋 View Results' : '⏯️ Continue Quiz'"></a>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${quizzes.isEmpty()}" class="empty-state">
            <div class="empty-icon">📚</div>
            <div class="empty-title">No Quizzes Yet</div>
            <div class="empty-text">You haven't taken any quizzes yet. Start your first quiz now!</div>
            <a href="/quiz" class="btn-start">Take a Quiz Now →</a>
        </div>
    </div>

    <script>
        function filterQuizzes(filter) {
            const cards = document.querySelectorAll('.quiz-card');
            let visibleCount = 0;

            cards.forEach(card => {
                let show = false;
                const isCompleted = card.dataset.completed === 'true';

                if (filter === 'all') {
                    show = true;
                } else if (filter === 'completed' && isCompleted) {
                    show = true;
                } else if (filter === 'incomplete' && !isCompleted) {
                    show = true;
                }

                card.style.display = show ? 'block' : 'none';
                if (show) visibleCount++;
            });

            // Update button states
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Show empty message if needed
            if (visibleCount === 0) {
                let emptyMsg = document.querySelector('.empty-state');
                if (!emptyMsg) {
                    emptyMsg = document.createElement('div');
                    emptyMsg.className = 'empty-state';
                    emptyMsg.innerHTML = '<div class="empty-icon">🔍</div><div class="empty-title">No quizzes found</div>';
                    document.querySelector('.quiz-grid').parentElement.appendChild(emptyMsg);
                }
            }
        }
    </script>
</body>
</html>
